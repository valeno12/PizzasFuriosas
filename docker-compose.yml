# Postgres de desarrollo. En producción se usa un free tier (Neon/Supabase)
# vía la variable DATABASE_URL — ver backend/.env.example.
services:
  db:
    image: postgres:16-alpine
    container_name: pizzasfuriosas-db
    environment:
      POSTGRES_DB: pizzasfuriosas
      POSTGRES_USER: pizzas
      POSTGRES_PASSWORD: pizzas
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pizzas -d pizzasfuriosas']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
